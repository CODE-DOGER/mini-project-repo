{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="text-center mb-4">Create an Account</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" class="form-control" required placeholder="(123) 456-7890">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" required placeholder="••••••••">
            <small class="text-muted">Must be at least 6 characters.</small>
        </div>
        <button type="submit" class="btn btn-block mt-4" id="submitBtn">Sign Up</button>
    </form>
    <p class="text-center mt-4 text-muted">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 500; text-decoration: none;">Log in</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
        const data = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value
        };
        
        if (data.password.length < 6) {
            throw new Error("Password must be at least 6 characters.");
        }

        const result = await apiCall('register', 'POST', data);
        
        showSuccess("Account created successfully. Please log in.");
        setTimeout(() => {
            window.location.href = "{{ url_for('login') }}";
        }, 1500);

    } catch(err) {
        btn.textContent = 'Sign Up';
        btn.disabled = false;
        showAlert(err.message);
    }
});
</script>
{% endblock %}
